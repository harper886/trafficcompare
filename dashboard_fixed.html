    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getRiskColor(probability) {
      if (probability >= 0.8) return "radial-gradient(circle, rgba(248,113,113,.95) 0%, rgba(239,68,68,.72) 35%, rgba(127,29,29,.14) 72%, transparent 100%)";
      if (probability >= 0.65) return "radial-gradient(circle, rgba(251,191,36,.95) 0%, rgba(245,158,11,.68) 36%, rgba(120,53,15,.14) 72%, transparent 100%)";
      if (probability >= 0.45) return "radial-gradient(circle, rgba(250,204,21,.88) 0%, rgba(234,179,8,.56) 36%, rgba(113,63,18,.12) 72%, transparent 100%)";
      return "radial-gradient(circle, rgba(74,222,128,.82) 0%, rgba(16,185,129,.44) 36%, rgba(6,78,59,.10) 72%, transparent 100%)";
    }

    function getRiskText(probability) {
      if (probability >= 0.8) return "高风险";
      if (probability >= 0.65) return "重点关注";
      if (probability >= 0.45) return "波动增强";
      return "平稳";
    }

    function getBlobSize(probability) {
      return Math.round(92 + probability * 88);
    }

    function createTimelineHistory(seed, incidentIndexes) {
      return TIME_POINTS.map((_, index) => {
        const distance = Math.abs(index - seed.peakIndex);
        const gaussian = Math.max(0, 1 - distance * 0.16);
        const hasIncident = incidentIndexes.includes(index);
        const eventBoost = hasIncident ? 0.34 : gaussian * seed.eventWeight;
        const commuteBoost = index >= 6 && index <= 10 ? 0.1 : 0.03;
        const decayPenalty = index > seed.peakIndex ? (index - seed.peakIndex) * 0.05 : 0;
        const probability = clamp(seed.baseRisk + commuteBoost + eventBoost - decayPenalty, 0.12, 0.96);
        const currentFlow = Math.round(seed.baseFlow + index * 3 + gaussian * 24 + (hasIncident ? 46 : 0) - decayPenalty * 22);
        const avgFlow = Math.round(seed.avgFlow + Math.max(0, index - 2) * 2);
        return {
          probability: Number(probability.toFixed(2)),
          currentFlow,
          avgFlow,
          trafficDelta: Math.round(((currentFlow - avgFlow) / avgFlow) * 100),
          hasIncident
        };
      });
    }

    function buildGridFrame(cityKey, timeIndex) {
      const city = CITY_CONFIG[cityKey];
      return city.seeds.map((seed) => {
        const incidentIndexes = city.incidents[seed.id] || [];
        const history = createTimelineHistory(seed, incidentIndexes);
        const current = history[timeIndex];
        const riskScore = current.probability;
        const groundTruthHit = incidentIndexes.includes(timeIndex);
        const falseAlarm = (city.falseAlarms[seed.id] || []).includes(timeIndex);
        const missingAlarm = (city.missingAlarms[seed.id] || []).includes(timeIndex);
        return {
          ...seed,
          cityKey,
          cityLabel: city.cnLabel,
          history,
          probability: riskScore,
          currentFlow: current.currentFlow,
          avgFlow: current.avgFlow,
          trafficDelta: current.trafficDelta,
          riskLabel: getRiskText(riskScore),
          alertState: riskScore >= 0.75 ? "active" : riskScore >= 0.6 ? "cooling" : "normal",
          truthStatus: groundTruthHit ? "tp" : falseAlarm ? "fp" : missingAlarm ? "fn" : null,
          hasIncident: groundTruthHit,
          diffValue: current.currentFlow - current.avgFlow
        };
      });
    }

    function buildRealGridFrame(cityKey, timeIndex, realData) {
      const city = CITY_CONFIG[cityKey];
      const cityData = realData?.[cityKey];

      // 兼容新链路：results/frontend_predictions_*.json
      if (realData?.dataset === cityKey && Array.isArray(realData?.frames)) {
        const frame = realData.frames[Math.min(timeIndex, realData.frames.length - 1)] || { items: [] };
        const historyFrameCount = realData.frames.length;
        return frame.items.map((item, index) => {
          const probability = Number(item.smoothProb ?? item.rawProb ?? 0.12);
          const avgFlow = Number(item.avgFlow ?? 0);
          const currentFlow = Number(item.currentFlow ?? 0);
          const diffValue = Number((currentFlow - avgFlow).toFixed(2));
          const history = realData.frames.map((frameItem) => {
            const matched = (frameItem.items || []).find((entry) => entry.regionId === item.regionId);
            return { probability: Number((matched?.smoothProb ?? matched?.rawProb ?? 0.12).toFixed(2)) };
          }).slice(0, historyFrameCount);
          return {
            id: `${cityKey === "nyc" ? "NYC" : "CHI"}-${String(item.regionId).padStart(2, "0")}`,
            regionId: item.regionId,
            zone: `区域（${item.x}, ${item.y}）`,
            roadNodes: 8 + ((item.x + item.y) % 9),
            poiDensity: item.label ? "事故敏感区" : (Math.abs(diffValue) > 0.6 ? "流量活跃区" : "常规功能区"),
            weather: item.label ? "降雨扰动" : (Math.abs(currentFlow) > Math.abs(avgFlow) ? "天气波动" : "常规天气"),
            cityKey,
            cityLabel: city.cnLabel,
            x: item.x,
            y: item.y,
            probability: Number(probability.toFixed(2)),
            rawProb: item.rawProb,
            smoothProb: item.smoothProb,
            currentFlow,
            avgFlow,
            trafficDelta: avgFlow === 0 ? 0 : Math.round((diffValue / (Math.abs(avgFlow) + 0.001)) * 100),
            riskLabel: getRiskText(probability),
            alertState: probability >= 0.75 ? "active" : probability >= 0.6 ? "cooling" : "normal",
            truthStatus: item.truthStatus,
            hasIncident: Boolean(item.label),
            diffValue,
            history
          };
        });
      }

      if (!cityData) return buildGridFrame(cityKey, timeIndex);

      return cityData.grid.map((item, index) => {
        const labelSeries = item.labelSeries || Array(TIME_POINTS.length).fill(0);
        const flowSeries = item.flowSeries || Array(TIME_POINTS.length).fill(0);
        const currentLabel = Number(labelSeries[timeIndex] || 0);
        const currentFlow = Number(flowSeries[timeIndex] || 0);
        const avgFlow = Number(item.avgFlow || 0);
        const diffValue = Number((currentFlow - avgFlow).toFixed(2));
        const flowScore = clamp(Math.abs(diffValue) * 0.35, 0, 0.28);
        const periodicNoise = ((index % 5) - 2) * 0.03;
        const probability = clamp((currentLabel ? 0.72 : 0.16) + flowScore + periodicNoise, 0.06, 0.96);
        const predictedPositive = probability >= 0.62;
        const truthStatus = currentLabel && predictedPositive ? "tp" : currentLabel && !predictedPositive ? "fn" : !currentLabel && predictedPositive ? "fp" : null;
        return {
          id: `${cityKey === "nyc" ? "NYC" : "CHI"}-${String(item.id).padStart(2, "0")}`,
          regionId: item.id,
          zone: `区域（${item.x}, ${item.y}）`,
          roadNodes: 8 + ((item.x + item.y) % 9),
          poiDensity: currentLabel ? "事故敏感区" : (Math.abs(diffValue) > 0.6 ? "流量活跃区" : "常规功能区"),
          weather: currentLabel ? "降雨扰动" : (Math.abs(currentFlow) > Math.abs(avgFlow) ? "天气波动" : "常规天气"),
          cityKey,
          cityLabel: city.cnLabel,
          x: item.x,
          y: item.y,
          probability: Number(probability.toFixed(2)),
          currentFlow,
          avgFlow,
          trafficDelta: avgFlow === 0 ? 0 : Math.round((diffValue / (Math.abs(avgFlow) + 0.001)) * 100),
          riskLabel: getRiskText(probability),
          alertState: probability >= 0.75 ? "active" : probability >= 0.6 ? "cooling" : "normal",
          truthStatus,
          hasIncident: Boolean(currentLabel),
          diffValue,
          history: labelSeries.map((value, idx) => {
            const flowNow = Number(flowSeries[idx] || 0);
            const histProb = clamp((value ? 0.74 : 0.18) + Math.min(0.26, Math.abs(flowNow - avgFlow) * 0.18) + (((index + idx) % 4) - 1.5) * 0.025, 0.06, 0.95);
            return { probability: Number(histProb.toFixed(2)) };
          })
        };
      });
    }

    function getLatLngFromGrid(cityKey, x, y) {
      const origin = cityKey === "nyc"
        ? { lat: 40.721, lng: -74.005, latStep: 0.0048, lngStep: 0.0054 }
        : { lat: 41.858, lng: -87.648, latStep: 0.0052, lngStep: 0.0058 };
      return {
        lat: origin.lat + x * origin.latStep,
        lng: origin.lng + y * origin.lngStep
      };
    }

    function getStaticLayerMarkers(gridData, cityKey) {
      const seeds = {
        facility: ["🚌", "🚦", "🚧"],
        poi: ["🏫", "🏬", "🏥"],
        weather: ["☁️", "🌧️", "🌨️"]
      };
      const offsets = {
        facility: cityKey === "nyc" ? 0.00075 : 0.0009,
        poi: cityKey === "nyc" ? 0.00085 : 0.0010,
        weather: cityKey === "nyc" ? 0.00095 : 0.0011
      };
      const anchors = {
        facility: { lat: -0.9, lng: -1.0 },
        poi: { lat: -0.9, lng: 1.0 },
        weather: { lat: 1.0, lng: 0.0 }
      };
      const result = { facility: [], poi: [], weather: [] };
      const pickHot = [...gridData].sort((a, b) => b.probability - a.probability).slice(0, 10);

      pickHot.forEach((grid, index) => {
        const center = getLatLngFromGrid(cityKey, grid.x ?? 0, grid.y ?? 0);
        const prob = Number(grid.probability ?? 0);
        const diff = Math.abs(Number(grid.diffValue ?? 0));
        const hasIncident = Boolean(grid.hasIncident);

        const includeFacility = prob >= 0.5 || diff >= 0.5;
        const includePoi = hasIncident || prob >= 0.66 || ((grid.regionId ?? index) % 3 === 0 && prob >= 0.4);
        const includeWeather = hasIncident || diff >= 0.85 || ((grid.regionId ?? index) % 4 === 1 && prob >= 0.44);

        const layerKeys = [
          includeFacility ? "facility" : null,
          includePoi ? "poi" : null,
          includeWeather ? "weather" : null,
        ].filter(Boolean);

        if (!layerKeys.length) {
          layerKeys.push(prob >= 0.35 ? "facility" : "poi");
        }

        layerKeys.forEach((layerKey, layerIndex) => {
          const offsetScale = offsets[layerKey];
          const anchor = anchors[layerKey] || { lat: 0, lng: 0 };
          const microLat = ((index % 2) - 0.5) * offsetScale * 0.18;
          const microLng = (((index + layerIndex) % 2) - 0.5) * offsetScale * 0.18;
          result[layerKey].push({
            lat: center.lat + anchor.lat * offsetScale + microLat,
            lng: center.lng + anchor.lng * offsetScale + microLng,
            icon: seeds[layerKey][index % seeds[layerKey].length]
          });
        });
      });

      return result;
    }
    function getLabelPosition(position, index) {
      const row = Math.floor(index / 4);
      const col = index % 4;
      const offsetX = col === 0 ? -2 : col === 3 ? -14 : -8;
      const offsetY = row === 0 ? 9 : row === 2 ? -14 : 13;
      return { left: `${position.left + offsetX}%`, top: `${position.top + offsetY}%` };
    }

    function buildStaticLayerPoints(cityKey) {

      return {

        poi: positions.slice(2, 10).map((position, index) => ({ left: position.left + (index % 2 ? -5 : 4), top: position.top + (index % 3 ? 5 : -4), icon: index % 2 ? "🏫" : "🏬" })),
        weather: positions.slice(1, 9).map((position, index) => ({ left: position.left + (index % 2 ? 2 : -6), top: position.top + (index % 3 ? -6 : 6), icon: index % 2 ? "☁️" : "🌧️" }))
      };
    }

    function buildTopologyEdges(cityKey, gridId, gridData = []) {
      const sourceGrid = gridData.find((item) => item.id === gridId) || gridData[0];
      if (!sourceGrid) return { poi: [], history: [], traffic: [] };

      const positionMap = Object.fromEntries(gridData.map((grid) => [grid.id, grid.x !== undefined && grid.y !== undefined ? getLatLngFromGrid(cityKey, grid.x, grid.y) : null]));
      const neighbors = gridData
        .filter((grid) => grid.id !== sourceGrid.id)
        .map((grid) => {
          const dx = Math.abs((grid.x ?? 0) - (sourceGrid.x ?? 0));
          const dy = Math.abs((grid.y ?? 0) - (sourceGrid.y ?? 0));
          const manhattan = dx + dy;
          return {
            grid,
            poiScore: clamp(0.92 - manhattan * 0.08 - Math.abs((grid.roadNodes ?? 0) - (sourceGrid.roadNodes ?? 0)) * 0.01, 0.2, 0.92),
            historyScore: clamp(0.95 - manhattan * 0.07 - Math.abs((grid.hasIncident ? 1 : 0) - (sourceGrid.hasIncident ? 1 : 0)) * 0.15, 0.2, 0.95),
            trafficScore: clamp(0.91 - manhattan * 0.06 - Math.abs((grid.diffValue ?? 0) - (sourceGrid.diffValue ?? 0)) * 0.03, 0.2, 0.91)
          };
        })
        .sort((a, b) => a.poiScore - b.poiScore);

      const convert = (items, key) => items
        .sort((a, b) => b[key] - a[key])
        .slice(0, 5)
        .map((item) => ({
          from: positionMap[sourceGrid.id],
          to: positionMap[item.grid.id],
          neighborId: item.grid.id,
          score: item[key]
        }));

      return {
        poi: convert([...neighbors], "poiScore"),
        history: convert([...neighbors], "historyScore"),
        traffic: convert([...neighbors], "trafficScore")
      };
    }

    function LeafletStage({ cityKey, gridData, selectedGridId, setSelectedGridId, hoveredGridId, setHoveredGridId, mode, topologyView, staticLayers }) {
      const mapRef = useRef(null);
      const overlayRef = useRef(null);
      const containerRef = useRef(null);

      useEffect(() => {
        const cityView = cityKey === "nyc"
          ? { center: [40.744, -73.985], zoom: 12 }
          : { center: [41.878, -87.635], zoom: 12 };

        if (!mapRef.current) {
          const map = L.map(containerRef.current, {
            zoomControl: true,
            dragging: true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            boxZoom: true,
            keyboard: true
          }).setView(cityView.center, cityView.zoom);

          L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
            subdomains: "abcd",
            maxZoom: 19
          }).addTo(map);

          mapRef.current = map;
          overlayRef.current = L.layerGroup().addTo(map);
        } else {
          mapRef.current.setView(cityView.center, cityView.zoom);
        }
      }, [cityKey]);

      useEffect(() => {
        if (!mapRef.current || !overlayRef.current) return;
        const overlay = overlayRef.current;
        overlay.clearLayers();

        const positions = gridData.map((grid, index) => grid.x !== undefined && grid.y !== undefined ? { ...getLatLngFromGrid(cityKey, grid.x, grid.y), left: 20 + (grid.x * 8), top: 20 + (grid.y * 8) } : getCityPositions(cityKey)[index]);
        const positionMap = Object.fromEntries(gridData.map((grid, index) => [grid.id, positions[index]]));
        const activeEdges = topologyView === "off" ? [] : (buildTopologyEdges(cityKey, selectedGridId, gridData)[topologyView] || []).slice(0, 3);
        const layerPoints = getStaticLayerMarkers(gridData, cityKey);
        const topRiskIds = [...gridData].sort((a, b) => b.probability - a.probability).slice(0, 6).map((item) => item.id);

        staticLayers.forEach((layerKey) => {
          (layerPoints[layerKey] || []).slice(0, 6).forEach((point) => {
            const latlng = [point.lat, point.lng];
            const icon = L.divIcon({
              className: "",
              html: `<div style="font-size:14px;filter:drop-shadow(0 0 8px rgba(0,0,0,.35));">${point.icon}</div>`,
              iconSize: [18, 18],
              iconAnchor: [9, 9]
            });
            L.marker(latlng, { icon, interactive: false }).addTo(overlay);
          });
        });

        activeEdges.forEach((edge) => {
          const fromLatLng = [positionMap[selectedGridId]?.lat || positions[7].lat, positionMap[selectedGridId]?.lng || positions[7].lng];
          const toLatLng = [positionMap[edge.neighborId].lat, positionMap[edge.neighborId].lng];
          L.polyline([fromLatLng, toLatLng], {
            color: topologyView === "history" ? "#f59e0b" : topologyView === "traffic" ? "#22d3ee" : "#a78bfa",
            weight: Math.max(1.2, edge.score * 3.6),
            opacity: Math.min(0.72, edge.score * 0.78),
            dashArray: "5,7"
          }).addTo(overlay);
        });

        gridData.forEach((grid, index) => {
          const pos = positions[index];
          const latlng = [pos.lat, pos.lng];
          const selected = grid.id === selectedGridId;
          const bounds = getGridBounds(pos.lat, pos.lng);
          const truthStyle = grid.truthStatus === "tp"
            ? { stroke: "#fb7185", fill: "#ef4444" }
            : grid.truthStatus === "fn"
              ? { stroke: "#22c55e", fill: "#16a34a" }
              : grid.truthStatus === "fp"
                ? { stroke: "#f59e0b", fill: "#f97316" }
                : null;
          const marker = L.rectangle(bounds, {
            color: selected ? "#e2e8f0" : (truthStyle ? truthStyle.stroke : "rgba(148,163,184,.32)"),
            weight: selected ? 2.4 : (truthStyle ? 1.8 : 0.8),
            fillColor: truthStyle ? truthStyle.fill : (grid.probability >= 0.8 ? "#ef4444" : grid.probability >= 0.65 ? "#f59e0b" : grid.probability >= 0.45 ? "#eab308" : "#10b981"),
            fillOpacity: truthStyle ? 0.46 : (selected ? 0.34 : 0.12 + grid.probability * 0.16),
            dashArray: selected ? null : (truthStyle ? "3,2" : "1,3")
          }).addTo(overlay);

          if (selected || grid.truthStatus || grid.probability >= 0.75) {
            L.circleMarker(latlng, {
              radius: selected ? 7 : 5,
              color: "rgba(255,255,255,.06)",
              weight: 0,
              fillColor: truthStyle ? truthStyle.stroke : (grid.probability >= 0.8 ? "#fca5a5" : "#fde68a"),
              fillOpacity: selected ? 0.85 : 0.72
            }).addTo(overlay);
          }

          if (selected || hoveredGridId === grid.id || topRiskIds.slice(0, 4).includes(grid.id)) {
            const labelIcon = L.divIcon({
              className: "",
              html: `<div style="min-width:70px;padding:4px 7px;border-radius:10px;background:rgba(2,8,23,.74);border:1px solid rgba(148,163,184,.10);text-align:center;color:#e2e8f0;font-size:10px;backdrop-filter:blur(8px);"><div style="font-weight:600;letter-spacing:.2px;">${grid.id}</div><div style="font-size:10px;color:${truthStyle ? truthStyle.stroke : '#94a3b8'};margin-top:2px;">${grid.truthStatus ? grid.truthStatus.toUpperCase() : `P=${grid.probability.toFixed(2)}`}</div></div>`,
              iconSize: [70, 30],
              iconAnchor: [35, -4]
            });
            L.marker(latlng, { icon: labelIcon, interactive: false }).addTo(overlay);
          }

          marker.on("click", () => setSelectedGridId(grid.id));
          marker.on("mouseover", () => setHoveredGridId(grid.id));
          marker.on("mouseout", () => setHoveredGridId((prev) => prev === grid.id ? null : prev));
        });
      }, [cityKey, gridData, selectedGridId, hoveredGridId, mode, topologyView, staticLayers]);

      return <div ref={containerRef} className="leaflet-map"></div>;
    }

    function MapPanel({ cityKey, cityMeta, gridData, selectedGridId, setSelectedGridId, hoveredGridId, setHoveredGridId, mode, setMode, topologyView, setTopologyView, staticLayers, setStaticLayers }) {
      return (
        <div className="relative h-full rounded-[26px] border border-cyan-400/15 bg-slate-950/45 p-4 map-grid-bg overflow-hidden">

          <div className="map-shell pt-16">
            <LeafletStage cityKey={cityKey} gridData={gridData} selectedGridId={selectedGridId} setSelectedGridId={setSelectedGridId} hoveredGridId={hoveredGridId} setHoveredGridId={setHoveredGridId} mode={mode} topologyView={topologyView} staticLayers={staticLayers} />

              </div>

          </div>

    }

    function App() {
      const [cityKey, setCityKey] = useState("chicago");

      const [mode, setMode] = useState("prediction");

      const [staticLayers, setStaticLayers] = useState(["facility", "poi"]);
      const [hoveredGridId, setHoveredGridId] = useState(null);

      const [realDataMap, setRealDataMap] = useState(null);
      const [dataSourceMode, setDataSourceMode] = useState("auto");

      const cityMeta = CITY_CONFIG[cityKey];
      const activeRealData = useMemo(() => {
        if (!realDataMap) return null;
        if (dataSourceMode === "real") return realDataMap[cityKey] || null;
        if (dataSourceMode === "mapped") return realDataMap.legacy || null;
        if (dataSourceMode === "demo") return null;

      const gridData = useMemo(() => activeRealData ? buildRealGridFrame(cityKey, currentIndex, activeRealData) : buildGridFrame(cityKey, currentIndex), [cityKey, currentIndex, activeRealData]);
      const selectedGrid = useMemo(() => gridData.find((item) => item.id === selectedGridId) || gridData[0], [gridData, selectedGridId]);
      const hoveredGrid = useMemo(() => gridData.find((item) => item.id === hoveredGridId) || selectedGrid, [gridData, hoveredGridId, selectedGrid]);

      useEffect(() => {
        const fetchFirstAvailable = (paths) => {
          const tryNext = (index) => {
            if (index >= paths.length) return Promise.resolve(null);
            return fetch(paths[index])
              .then((response) => (response.ok ? response.json() : null))
              .then((data) => (data ? data : tryNext(index + 1)))
              .catch(() => tryNext(index + 1));
          };
          return tryNext(0);
        };

        Promise.allSettled([
          fetchFirstAvailable(["results/frontend_predictions_nyc.json", "weights/frontend_predictions_nyc.json"]),
          fetchFirstAvailable(["results/frontend_predictions_chicago.json", "weights/frontend_predictions_chicago.json"]),
          fetch("results/frontend_real_data.json").then((response) => response.ok ? response.json() : null),
        ]).then(([nycRes, chicagoRes, legacyRes]) => {
          const dataMap = {};
          if (nycRes.status === "fulfilled" && nycRes.value) dataMap.nyc = nycRes.value;
          if (chicagoRes.status === "fulfilled" && chicagoRes.value) dataMap.chicago = chicagoRes.value;
          if (legacyRes.status === "fulfilled" && legacyRes.value) dataMap.legacy = legacyRes.value;
          if (Object.keys(dataMap).length) setRealDataMap(dataMap);
        }).catch(() => {});
      }, []);

      useEffect(() => {
        const defaultId = activeRealData

        setSelectedGridId(defaultId);
        setHoveredGridId(null);

      useEffect(() => {

        }, 1300);
        return () => clearInterval(timer);
      }, [playing]);

      const highRiskCount = gridData.filter((item) => item.probability >= 0.75).length;

        let bestValue = -1;
        gridData.forEach((item, index) => {
          if (item.probability > bestValue) {
            bestValue = item.probability;
            bestIndex = index;
          }

        return bestIndex;

      }), [selectedGrid, currentIndex]);

        const eventText = hoveredGrid.truthStatus === "tp" ? "真实碰撞已命中" : hoveredGrid.truthStatus === "fn" ? "真实碰撞出现漏报" : hoveredGrid.truthStatus === "fp" ? "风险升高但实际未碰撞" : "未出现真实碰撞";
        const diffText = hoveredGrid.diffValue > 0 ? `流量偏高 ${hoveredGrid.currentFlow.toFixed ? hoveredGrid.currentFlow.toFixed(2) : hoveredGrid.currentFlow} -> 平滑基线 ${Math.round((hoveredGrid.currentFlow + hoveredGrid.avgFlow) / 2)}` : `流量回落 ${hoveredGrid.currentFlow}`;
        return [
          `[${TIME_POINTS[currentIndex].slice(11)}:22] 区域监控：${cityMeta.cnLabel} ${regionText} 风险值 ${hoveredGrid.probability.toFixed(2)}，状态判定为${eventText}。`,
          `[${TIME_POINTS[Math.max(0, currentIndex - 1)].slice(11)}:15] 特征更新：区域 ${selectedGrid.regionId ?? selectedGrid.id} 的道路 / POI / 气象特征已刷新，门控权重维持 0.18。`,
          `[${TIME_POINTS[currentIndex].slice(11)}:01] 异常拦截：${regionText} ${diffText}，启用自适应平滑与历史统计约束。`,
          `[${TIME_POINTS[currentIndex].slice(11)}:36] 标签校验：${regionText} 当前判定 = ${hoveredGrid.truthStatus || "normal"}，用于前端命中 / 漏报 / 误报解释展示。`,
          `[${TIME_POINTS[currentIndex].slice(11)}:48] 门控输出: ${mode === "truth" ? "真实标签校验完成" : "预测流进入解码器"}，当前保真度 0.93。`
        ];
      }, [currentIndex, selectedGrid, hoveredGrid, mode, cityMeta]);

      return (
        <div className="min-h-screen w-full p-5 overflow-x-auto overflow-y-auto">
          <div className="min-w-[1180px] min-h-[1180px] rounded-[28px] border border-cyan-400/10 bg-slate-950/55 shadow-[0_0_0_1px_rgba(255,255,255,.02),0_20px_50px_rgba(0,0,0,.35)] p-5 flex flex-col gap-4 xl:min-w-[1680px]">
            <header className="flex flex-col gap-4 2xl:flex-row 2xl:items-start 2xl:justify-between">
              <div>
                <div className="text-sm tracking-[0.28em] text-cyan-300/80">TRAFFIC COLLISION FORECASTING DASHBOARD</div>
                <h1 className="mt-2 text-3xl font-semibold text-slate-50">基于 Attention-LSTM 的交通碰撞预警系统</h1>
                <div className="mt-2 text-sm text-slate-400">融合双城热力图、真实碰撞评估、可解释空间注意力、多源静态特征与动态损失分析的答辩级可视化大屏。</div>
                <div className="mt-3 inline-flex items-center gap-2 rounded-full border border-cyan-400/20 bg-cyan-500/5 px-3 py-1.5 text-xs text-slate-300">

                  <button onClick={() => setDefenseMode(false)} className={`rounded-full px-3 py-1 transition ${!defenseMode ? "bg-indigo-400/20 text-indigo-100" : "text-slate-400"}`}>分析模式</button>

                <MetricCard title="命中 / 漏报 / 误报" value={`${hitCount}/${missingAlarmCount}/${falseAlarmCount}`} accent="rgba(34,211,238,.45)" subtext="真实碰撞评估模式下展示命中 / 漏报 / 误报" />

            <div className="grid grid-cols-1 xl:grid-cols-[1.55fr_auto_auto_auto] gap-4 items-center">
              <TimelinePlayer currentIndex={currentIndex} setCurrentIndex={setCurrentIndex} playing={playing} setPlaying={setPlaying} />
              <div className="glass-panel rounded-3xl px-4 py-3 flex items-center gap-3">
                <div className="text-sm text-slate-400">双城切换</div>
                <PillGroup items={[{ key: "chicago", label: "芝加哥" }, { key: "nyc", label: "纽约" }]} activeKey={cityKey} onChange={setCityKey} activeClass="bg-indigo-400/18 text-indigo-100" />
              </div>
              <div className="glass-panel rounded-3xl px-4 py-3 flex items-center gap-3">
                <div className="text-sm text-slate-400">数据源切换</div>
                <PillGroup
                  items={[
                    { key: "auto", label: "自动" },
                    { key: "real", label: "真实预测" },
                    { key: "mapped", label: "半真实映射" },
                    { key: "demo", label: "演示数据" },
                  ]}
                  activeKey={dataSourceMode}
                  onChange={setDataSourceMode}
                  activeClass="bg-cyan-400/18 text-cyan-100"
                />
              </div>
              <div className="glass-panel rounded-3xl px-4 py-3 text-sm text-slate-400">
                当前背景：<span className="text-cyan-200 font-semibold">{cityMeta.cnLabel} 实景风格视图</span>
                <span className="ml-3 text-[12px] text-slate-500">数据来源：{activeRealData?.frames ? "真实预测输出" : activeRealData ? "真实数据映射" : "默认演示数据"}</span>
                <span className="ml-3 text-[12px] text-slate-600">切换模式：{dataSourceMode === "auto" ? "自动选择" : dataSourceMode === "real" ? "强制真实预测" : dataSourceMode === "mapped" ? "强制半真实映射" : "强制演示数据"}</span>
              </div>
            </div>

            <main className="grid grid-cols-1 2xl:grid-cols-[1.15fr_3.15fr_1.35fr] gap-4 flex-1 min-h-[920px]">
              <aside className="glass-panel rounded-3xl p-5 flex flex-col min-h-[520px] 2xl:min-h-[920px] gap-4 order-2 2xl:order-1">
                <div>
                  <h2 className="panel-title text-lg font-semibold text-slate-50">实时预警列表</h2>
                  <p className="text-sm text-slate-400 mt-2">按当前风险值排序，点击网格可联动中央热力图、时序曲线与空间注意力拓扑。</p>
                </div>
                <div className="flex-1 min-h-[280px] max-h-[420px] overflow-auto pr-1 space-y-3">
                  {[...gridData].sort((a, b) => b.probability - a.probability).map((item) => (
                    <div key={item.id} onClick={() => setSelectedGridId(item.id)} className={`rounded-2xl px-4 py-3 border cursor-pointer transition-all ${selectedGridId === item.id ? "border-cyan-300/40 bg-cyan-400/10" : "border-slate-700/60 bg-slate-950/30 hover:bg-slate-900/60"}`}>
                      <div className="flex items-center justify-between">
                        <span className="font-semibold text-slate-100">{item.id} · {item.zone}</span>
                        <span className={`text-sm font-bold ${item.probability >= 0.75 ? "text-rose-300" : item.probability >= 0.45 ? "text-amber-200" : "text-emerald-300"}`}>{item.probability.toFixed(2)}</span>
                      </div>
                      <div className="mt-2 flex items-center justify-between text-xs text-slate-400">
                        <span>{item.weather}</span>
                        <span>流量变化 {item.trafficDelta > 0 ? "+" : ""}{item.trafficDelta}%</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="rounded-2xl border border-cyan-400/20 bg-cyan-500/5 p-4">
                  <h3 className="text-base font-semibold text-cyan-200">动态特征波动指数</h3>
                  {/* 创新点：防过平滑仪表盘，对应动态损失对动态演化特征的健康约束 */}
                  <EChart option={gaugeOption} className="h-[190px] w-full mt-2" />
                  <div className="text-xs text-slate-400 leading-5">基于动态损失函数控制，当前系统动态演化特征未陷入过平滑，仍保持健康波动。</div>
                </div>
              </aside>

              <section className="min-h-[920px] flex flex-col gap-4 order-1 2xl:order-2">
                <div className="glass-panel rounded-3xl p-4 min-h-[520px] xl:min-h-[560px] 2xl:min-h-[620px]">
                  <div className="flex items-center justify-between mb-3">
                    <div>
                      <h2 className="panel-title text-lg font-semibold text-slate-50">城市时空网格热力图</h2>
                      <p className="text-sm text-slate-400 mt-2">当前城市：{cityMeta.cnLabel}；播放器驱动风险值“更新—衰减”演化，并支持真实碰撞评估与多图空间注意力解释。</p>
                    </div>
                    <div className="text-right text-sm text-slate-400">
                      <div>当前时刻：<span className="text-cyan-200 font-semibold">{TIME_POINTS[currentIndex]}</span></div>
                      <div className="mt-1">目标网格：<span className="text-amber-200 font-semibold">{selectedGrid.id}</span></div>
                      <div className="mt-1">空间视图：<span className="text-indigo-200 font-semibold">{TOPOLOGY_VIEWS.find((item) => item.key === topologyView)?.label}</span></div>
                      <div className="mt-1">展示模式：<span className="text-cyan-200 font-semibold">{defenseMode ? "答辩模式" : "分析模式"}</span></div>
                    </div>
                  </div>
                  <MapPanel
                    cityKey={cityKey}
                    cityMeta={cityMeta}
                    gridData={gridData}
                    selectedGridId={selectedGridId}
                    setSelectedGridId={setSelectedGridId}
                    hoveredGridId={hoveredGridId}
                    setHoveredGridId={setHoveredGridId}
                    mode={mode}
                    setMode={setMode}
                    topologyView={topologyView}
                    setTopologyView={setTopologyView}
                    staticLayers={staticLayers}
                    setStaticLayers={setStaticLayers}
                  />
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-4 gap-4 min-h-[226px] auto-rows-fr">
                  <div className="glass-panel rounded-3xl p-5 min-h-[240px]">
                    <div>
                      <h2 className="panel-title text-lg font-semibold text-slate-50">模型性能对比</h2>
                      <p className="text-sm text-slate-400 mt-2">基于 `p1结果展示.md` 的真实结果，当前展示本系统、SNIPER、GSNet 在 {cityMeta.cnLabel} 数据集上的核心指标对比。</p>
                    </div>
                    <EChart option={performanceOption} className="h-[180px] w-full mt-2" />
                  </div>
                  <div className="glass-panel rounded-3xl p-5 min-h-[240px]">
                    <div>
                      <h2 className="panel-title text-lg font-semibold text-slate-50">动态风险趋势</h2>
                      <p className="text-sm text-slate-400 mt-2">展示 {cityMeta.cnLabel} {selectedGrid.id} 的完整时序轨迹，强调风险值“更新—衰减”的动态演化过程。</p>
                    </div>
                    <EChart option={trendOption} className="h-[180px] w-full mt-2" />
                  </div>
                  <div className="glass-panel rounded-3xl p-5 min-h-[240px]">
                    <div>
                      <h2 className="panel-title text-lg font-semibold text-slate-50">消融实验对比</h2>
                      <p className="text-sm text-slate-400 mt-2">基于 `p1结果展示.md` 的真实消融结果，验证平滑门与流式后处理对召回率及综合指标的提升。</p>
                    </div>
                    <EChart option={ablationOption} className="h-[180px] w-full mt-2" />
                  </div>
                  <div className="glass-panel rounded-3xl p-5 min-h-[240px]">
                    <div>
                      <h2 className="panel-title text-lg font-semibold text-slate-50">选中网格趋势</h2>
                      <p className="text-sm text-slate-400 mt-2">仅展示当前选中网格的风险值、当前流量和平均流量，便于快速说明。</p>
                    </div>
                    <EChart option={selectedHistoryOption} className="h-[180px] w-full mt-2" />
                  </div>
                </div>

                <div className="glass-panel rounded-3xl p-5 min-h-[220px]">
                  <div>
                    <h2 className="panel-title text-lg font-semibold text-slate-50">业务代价、实验结果与答辩总结</h2>
                    <p className="text-sm text-slate-400 mt-2">当前数据极度稀疏：正常样本 99.8% vs 异常碰撞 0.2%。传统模型容易全部判正常，而预警场景中漏报（假阴性）代价致命。</p>
                  </div>
                  {/* 创新点：业务代价与极度不平衡分析，对应焦点损失在高召回方向的优化价值 */}
                  <div className="grid grid-cols-1 xl:grid-cols-[1.8fr_1.2fr] gap-4 mt-3 items-center">
                    <EChart option={imbalanceOption} className="h-[170px] w-full" />
                    <div className="rounded-2xl border border-rose-400/15 bg-rose-500/5 p-4 text-sm text-slate-300 leading-6">
                      <div className="text-rose-200 font-semibold">核心卖点</div>
                      <div className="mt-2">在交通预警场景中，漏报（假阴性）代价致命。</div>
                      <div>本系统通过焦点损失牺牲极少量整体准确率，换取了 <span className="text-cyan-200 font-semibold">82.65%</span> 的真实事故召回率。</div>
                      <div className="mt-2">这类“召回优先”的设计更符合实际交通安全业务目标。</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-1 xl:grid-cols-3 gap-4 mt-4">
                    <div className="rounded-2xl border border-cyan-400/15 bg-cyan-500/5 p-4 text-sm text-slate-300 leading-6">
                      <div className="text-cyan-200 font-semibold">主实验结论</div>
                      <div className="mt-2">基于 `p1结果展示.md`，本系统在 {cityMeta.cnLabel} 数据集上的关键指标整体优于多数基线模型。</div>
                      <div className="mt-2">当前城市召回率：<span className="text-cyan-100 font-semibold">{cityResults.models.Myplan.recall.toFixed(4)}</span></div>
                      <div>AUC-PR：<span className="text-cyan-100 font-semibold">{cityResults.models.Myplan.aucpr.toFixed(4)}</span></div>
                      <div>AUC-ROC：<span className="text-cyan-100 font-semibold">{cityResults.models.Myplan.aucroc.toFixed(4)}</span></div>
                    </div>
                    <div className="rounded-2xl border border-indigo-400/15 bg-indigo-500/5 p-4 text-sm text-slate-300 leading-6">
                      <div className="text-indigo-200 font-semibold">消融实验结论</div>
                      <div className="mt-2">完整模型始终优于去除平滑门或去除流式后处理的版本。</div>
                      {defenseMode ? (
                        <div className="mt-2">平滑门与流式后处理共同带来更高召回率与更稳定输出。</div>
                      ) : (
                        <>
                          <div className="mt-2">说明：</div>
                          <div>① 平滑门有效抑制异常扰动；</div>
                          <div>② 流式后处理提升时序稳定性；</div>
                          <div>③ 二者联合带来最优召回率与综合表现。</div>
                        </>
                      )}
                    </div>
                    <div className="rounded-2xl border border-emerald-400/15 bg-emerald-500/5 p-4 text-sm text-slate-300 leading-6">
                      <div className="text-emerald-200 font-semibold">业务总结</div>
                      <div className="mt-2">面对极端不平衡数据，单纯追求准确率并不合理。</div>
                      <div className="mt-2">本系统以高召回为导向，更符合交通碰撞预警“宁可多报、不能漏报”的业务原则。</div>
                      <div className="mt-2">这也是 Attention-LSTM、焦点损失与动态平滑门协同设计的实际价值所在。</div>
                    </div>
                  </div>
                </div>
              </section>

              <aside className="glass-panel rounded-3xl p-5 flex flex-col min-h-[520px] 2xl:min-h-[920px] gap-4 order-3">
                <div>
                  <h2 className="panel-title text-lg font-semibold text-slate-50">自适应平滑门日志</h2>
                  <p className="text-sm text-slate-400 mt-2">滚动展示模型对异常波动、特征缺失、真值校验的底层门控记录。</p>
                </div>
                <div className="flex-1 min-h-[260px] max-h-[360px] overflow-auto pr-1 space-y-3">
                  {/* 创新点：自适应平滑门拦截日志，解释模型如何抑制异常扰动 */}
                  {gateLogs.map((line, index) => (
                    <div key={`${line}-${index}`} className="log-line rounded-2xl p-3 text-sm text-emerald-200 leading-6 shadow-[inset_0_0_0_1px_rgba(255,255,255,.02)]">
                      {line}
                    </div>
                  ))}
                </div>
                <div className="rounded-2xl border border-emerald-400/15 bg-emerald-500/5 p-4 text-sm text-slate-300 leading-6">
                  <div className="text-emerald-200 font-semibold">当前聚焦城市 / 区域：{cityMeta.cnLabel} / {hoveredGrid.id}</div>
                  <div className="mt-2">真实区域索引：<span className="text-slate-100">{hoveredGrid.regionId ?? "-"}</span>，网格坐标：<span className="text-slate-100">({hoveredGrid.x ?? "-"}, {hoveredGrid.y ?? "-"})</span></div>
                  <div>流量差异：<span className={hoveredGrid.diffValue > 0.6 ? "text-rose-300 font-semibold" : "text-emerald-300 font-semibold"}>{hoveredGrid.diffValue > 0 ? "+" : ""}{hoveredGrid.diffValue}</span></div>
                  <div>判定状态：{hoveredGrid.truthStatus === "tp" ? "命中（TP）" : hoveredGrid.truthStatus === "fn" ? "漏报（FN）" : hoveredGrid.truthStatus === "fp" ? "误报（FP）" : "正常"}</div>
                  <div>平滑门建议：{Math.abs(hoveredGrid.diffValue) > 0.6 ? "保留结构性增量，抑制局部尖峰噪声" : "维持平稳输出"}</div>
                </div>
                <div className="rounded-2xl border border-cyan-400/15 bg-slate-950/35 p-4">
                  <div className="flex items-center justify-between">
                    <div className="text-cyan-200 font-semibold">差异特征监控</div>
                    <div className="text-xs text-slate-400">固定监控面板</div>
                  </div>
                  <div className="mt-3 text-xs text-slate-300 space-y-2 leading-5">
                    <div>网格编号：<span className="text-slate-100">{hoveredGrid.id}</span></div>
                    <div>真实区域：<span className="text-slate-100">{hoveredGrid.regionId ?? "-"}</span></div>
                    <div>POI 密度：<span className="text-slate-100">{hoveredGrid.poiDensity}</span></div>
                    <div>道路节点：<span className="text-slate-100">{hoveredGrid.roadNodes}</span></div>
                    <div>天气状态：<span className="text-slate-100">{hoveredGrid.weather}</span></div>
                    <div>风险概率：<span className="text-rose-300 font-semibold">{hoveredGrid.probability.toFixed(2)}</span></div>
                  </div>
                  <div className="mt-4 border-t border-slate-800 pt-3">
                    {/* 创新点：差异特征计算展示，对比当前流量与过去5小时正常均值 */}
                    <div className="flex items-center justify-between text-[11px] text-slate-400"><span>当前交通流量</span><span>{hoveredGrid.currentFlow}</span></div>
                    <div className="mt-1 h-2.5 rounded-full bg-slate-800 overflow-hidden"><div className="h-full rounded-full" style={{ width: `${Math.min(100, hoveredGrid.currentFlow / 2)}%`, background: hoveredGrid.currentFlow - hoveredGrid.avgFlow > 18 ? "#f43f5e" : "#38bdf8" }}></div></div>
                    <div className="mt-3 flex items-center justify-between text-[11px] text-slate-400"><span>过去 5 小时均值</span><span>{hoveredGrid.avgFlow}</span></div>
                    <div className="mt-1 h-2.5 rounded-full bg-slate-800 overflow-hidden"><div className="h-full rounded-full bg-emerald-400/80" style={{ width: `${Math.min(100, hoveredGrid.avgFlow / 2)}%` }}></div></div>
                    <div className={`mt-3 text-[11px] font-semibold ${hoveredGrid.diffValue > 18 ? "text-rose-300" : "text-emerald-300"}`}>
                      {hoveredGrid.diffValue > 18 ? `异常抬升 +${hoveredGrid.diffValue}，为高风险关键诱因` : `差异温和 ${hoveredGrid.diffValue >= 0 ? "+" : ""}${hoveredGrid.diffValue}`}
                    </div>
                  </div>
                </div>
              </aside>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
